<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-capable" content="yes">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المسلم الذكي Ultimate v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d4ff; --neon-green: #00ff88; --neon-red: #ff4757;
            --glass: rgba(255, 255, 255, 0.08); --bg: #0f172a;
            --accent: var(--neon-blue);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background: var(--bg); color: white; font-family: 'Cairo', sans-serif;
            margin: 0; padding: 0; overflow: hidden; height: 100vh;
        }
        
        /* Layout */
        .app-wrapper { height: 100vh; display: flex; flex-direction: column; }
        .content-area { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 90px; }
        .page { display: none; animation: slideUp 0.4s ease; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Components */
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 20px; margin-bottom: 20px; }
        .btn-primary { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: #000; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-primary:active { transform: scale(0.95); }

        /* Home View */
        .clock-section { text-align: center; margin-bottom: 30px; }
        #time { font-size: 3.5rem; font-weight: 700; text-shadow: 0 0 20px var(--accent); margin: 0; }
        .next-prayer-banner { background: rgba(0,212,255,0.1); border: 1px solid var(--neon-blue); padding: 10px; border-radius: 12px; color: var(--neon-blue); font-size: 0.9rem; margin-top: 10px; }

        /* Prayer List */
        .prayer-row { display: flex; justify-content: space-between; align-items: center; padding: 18px; background: var(--glass); border-radius: 16px; margin-bottom: 10px; border-right: 4px solid transparent; }
        .prayer-row.active { border-right-color: var(--neon-green); background: rgba(0, 255, 136, 0.05); }
        .prayer-row.passed { opacity: 0.4; }

        /* Compass */
        .compass-container { width: 260px; height: 260px; margin: 30px auto; position: relative; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255,255,255,0.1); border-radius: 50%; }
        #needle { position: absolute; width: 8px; height: 110px; background: linear-gradient(to top, transparent, var(--neon-red) 50%, var(--neon-blue)); border-radius: 10px; transform-origin: bottom center; bottom: 50%; transition: transform 0.2s ease-out; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); display: flex; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; color: #64748b; cursor: pointer; }
        .nav-link.active { color: var(--accent); }
        .nav-link svg { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }

        /* Toast */
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 12px 24px; border-radius: 50px; font-weight: bold; z-index: 9999; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="app-wrapper">
        <main class="content-area">
            
            <section id="home" class="page active">
                <div class="clock-section">
                    <p id="hijri" style="opacity: 0.6; margin: 0;"></p>
                    <h1 id="time">00:00</h1>
                    <div id="next-prayer-info" class="next-prayer-banner">جاري الحساب...</div>
                </div>
                <div id="prayer-items"></div>
            </section>

            <section id="tasbeeh" class="page">
                <h2 style="text-align:center">المسبحة الذكية</h2>
                <div id="zikr-container"></div>
            </section>

            <section id="qibla" class="page">
                <h2 style="text-align:center">اتجاه القبلة</h2>
                <div class="compass-container">
                    <div id="needle"></div>
                    <div style="width:20px; height:20px; background:#fff; border-radius:50%; z-index:10; box-shadow:0 0 15px var(--accent)"></div>
                </div>
                <div class="glass-card" style="text-align:center">
                    <p id="qibla-status">تحتاج القبلة لتفعيل الحساسات وموقعك</p>
                    <button class="btn-primary" onclick="requestCompass()">تفعيل الحساس</button>
                </div>
            </section>

            <section id="settings" class="page">
                <h2>الإعدادات</h2>
                <div class="glass-card">
                    <label style="display:block; margin-bottom:10px">تحديث يدوي للموقع</label>
                    <input type="text" id="city" placeholder="المدينة" style="width:100%; padding:12px; border-radius:8px; border:1px solid #334155; background:#1e293b; color:#fff; margin-bottom:10px">
                    <button class="btn-primary" onclick="fetchByCity()" style="margin-bottom:10px">تحديث</button>
                    <button class="btn-primary" onclick="fetchByGPS()" style="background:var(--neon-green)">تحديد موقعي (GPS) 📍</button>
                </div>
            </section>

        </main>

        <nav class="nav-bar">
            <div class="nav-link active" onclick="navigate('home', this)">🏠<span>الرئيسية</span></div>
            <div class="nav-link" onclick="navigate('tasbeeh', this)">📿<span>تسبيح</span></div>
            <div class="nav-link" onclick="navigate('qibla', this)">🧭<span>القبلة</span></div>
            <div class="nav-link" onclick="navigate('settings', this)">⚙️<span>الإعدادات</span></div>
        </nav>
    </div>

    <script>
        // --- Core Logic ---
        let state = {
            prayers: JSON.parse(localStorage.getItem('prayers')) || {},
            qibla: localStorage.getItem('qibla') || 0,
            azkar: [
                { id: 1, text: "سُبْحَانَ اللَّهِ", count: 0, target: 33 },
                { id: 2, text: "الْحَمْدُ لِلَّهِ", count: 0, target: 33 },
                { id: 3, text: "اللَّهُ أَكْبَرُ", count: 0, target: 34 }
            ]
        };

        function navigate(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
            if(pageId === 'qibla') initCompass();
        }

        function updateUI() {
            const now = new Date();
            // Clock
            document.getElementById('time').innerText = now.toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('hijri').innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);
            
            // Prayers
            if(Object.keys(state.prayers).length > 0) {
                renderPrayers(now);
            }
        }

        function renderPrayers(now) {
            const container = document.getElementById('prayer-items');
            const currentMins = now.getHours() * 60 + now.getMinutes();
            let html = '';
            let nextP = null;

            const prayerNames = { Fajr: "الفجر", Dhuhr: "الظهر", Asr: "العصر", Maghrib: "المغرب", Isha: "العشاء" };
            
            Object.entries(prayerNames).forEach(([key, label]) => {
                const timeStr = state.prayers[key];
                const [h, m] = timeStr.split(':').map(Number);
                const pMins = h * 60 + m;
                let status = '';

                if (currentMins > pMins) status = 'passed';
                else if (!nextP) { 
                    status = 'active'; 
                    nextP = { label, diff: pMins - currentMins };
                }

                html += `
                    <div class="prayer-row ${status}">
                        <span>${label}</span>
                        <span style="font-weight:bold">${timeStr}</span>
                    </div>`;
            });

            container.innerHTML = html;
            if(nextP) {
                document.getElementById('next-prayer-info').innerText = `باقي لـ ${nextP.label}: ${Math.floor(nextP.diff/60)}س و ${nextP.diff%60}د`;
            }
        }

        // --- Data Fetching ---
        async function fetchByCity() {
            const city = document.getElementById('city').value;
            if(!city) return notify("يرجى إدخال اسم المدينة");
            try {
                const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=Algeria&method=3`);
                const json = await res.json();
                processData(json.data);
            } catch(e) { notify("خطأ في جلب البيانات"); }
        }

        function fetchByGPS() {
            notify("جاري تحديد موقعك...");
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch(`https://api.aladhan.com/v1/timings/${Math.floor(Date.now()/1000)}?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&method=3`);
                const json = await res.json();
                processData(json.data);
            });
        }

        function processData(data) {
            state.prayers = data.timings;
            state.qibla = data.meta.qibla;
            localStorage.setItem('prayers', JSON.stringify(state.prayers));
            localStorage.setItem('qibla', state.qibla);
            notify("تم التحديث بنجاح ✅");
            updateUI();
        }

        // --- Tasbeeh ---
        function renderTasbeeh() {
            const container = document.getElementById('zikr-container');
            container.innerHTML = state.azkar.map(z => `
                <div class="glass-card" onclick="tapZikr(${z.id})" style="text-align:center">
                    <div style="font-size:0.8rem; opacity:0.5">${z.count} / ${z.target}</div>
                    <div style="font-size:1.6rem; margin:10px 0">${z.text}</div>
                    <div style="height:4px; background:rgba(255,255,255,0.1); border-radius:10px">
                        <div style="height:100%; width:${(z.count/z.target)*100}%; background:var(--accent); transition:0.3s"></div>
                    </div>
                </div>
            `).join('');
        }

        function tapZikr(id) {
            const z = state.azkar.find(x => x.id === id);
            if(z.count < z.target) {
                z.count++;
                if(navigator.vibrate) navigator.vibrate(40);
                renderTasbeeh();
            }
        }

        // --- Compass ---
        function requestCompass() {
            if(typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if(res === 'granted') initCompass();
                });
            } else { initCompass(); }
        }

        function initCompass() {
            window.addEventListener('deviceorientationabsolute', (e) => {
                const alpha = e.alpha;
                if(alpha !== null) {
                    const rotate = state.qibla - alpha;
                    document.getElementById('needle').style.transform = `rotate(${rotate}deg)`;
                    document.getElementById('qibla-status').innerText = "البوصلة تعمل بدقة ✅";
                }
            }, true);
        }

        function notify(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        // Init
        setInterval(updateUI, 1000);
        updateUI();
        renderTasbeeh();
    </script>
</body>
</html>
